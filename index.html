<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pergunte ao Barry</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <!-- Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

</head>

<body>
    <section class="container">
        <div class="img-barry">
            <img src="img/barry.png" alt="Barry">
        </div>
        <div class="main">
            <h1>Pergunte ao Barry!</h1>
            <p>Coloque abaixo as opções o Barry decidirá por você!</p>
            <div class="inputs">
                <input type="text" name="input-text-1" id="input-text-1" placeholder="Opção 1" required aria-selected="true" >
                <p><b>ou</b></p>
                <input type="text" name="input-text-2" id="input-text-2" placeholder="Opção 2" required>
            </div>
            <button type="submit" id="btn-ask">
                Perguntar
            </button>
        </div>
        <div class="thanks">
            <p>Desenvolvido por <a href="caiquekola.com.br">Caique Augusto</a></p>
            <p>❤️ Dedicado ao Barry e minha amada noiva Alexya! ❤️</p>
        </div>
    </section>

</body>

</html>
